<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CodePilot Test Client</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --purple: #bc8cff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* --- Header --- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 17px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--green); }

  .status-text {
    font-size: 12px;
    color: var(--text-dim);
  }

  .e2e-badge {
    font-size: 10px;
    background: var(--green);
    color: #000;
    padding: 2px 6px;
    border-radius: 8px;
    font-weight: 600;
    display: none;
  }
  .e2e-badge.active { display: inline-block; }

  /* --- Connection Panel --- */
  .connect-panel {
    padding: 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .connect-panel.hidden { display: none; }

  .connect-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .connect-row:last-child { margin-bottom: 0; }

  .hidden { display: none; }

  input[type="text"], input[type="number"], select {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }

  input:focus { border-color: var(--accent); }

  button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  button:active { opacity: 0.7; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  button.danger { background: var(--red); }
  button.secondary { background: var(--border); }

  /* --- Events Stream --- */
  .events {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    -webkit-overflow-scrolling: touch;
  }

  .event-item {
    margin-bottom: 8px;
    padding: 10px 12px;
    background: var(--surface);
    border-radius: 10px;
    border-left: 3px solid var(--border);
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
  }

  .event-item .event-type {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .event-item.status { border-left-color: var(--accent); }
  .event-item.status .event-type { color: var(--accent); }

  .event-item.thinking { border-left-color: var(--purple); }
  .event-item.thinking .event-type { color: var(--purple); }

  .event-item.agent_message { border-left-color: var(--green); }
  .event-item.agent_message .event-type { color: var(--green); }

  .event-item.code_change { border-left-color: var(--yellow); }
  .event-item.code_change .event-type { color: var(--yellow); }

  .event-item.command_exec { border-left-color: #f97583; }
  .event-item.command_exec .event-type { color: #f97583; }

  .event-item.error { border-left-color: var(--red); }
  .event-item.error .event-type { color: var(--red); }

  .event-item.turn_completed { border-left-color: var(--green); }
  .event-item.turn_completed .event-type { color: var(--green); }

  .event-item.system { border-left-color: var(--text-dim); opacity: 0.7; }
  .event-item.system .event-type { color: var(--text-dim); }

  .event-detail {
    color: var(--text-dim);
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 12px;
    white-space: pre-wrap;
  }

  /* --- Input Area --- */
  .input-area {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  .input-row textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 18px;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.4;
  }

  .input-row textarea:focus { border-color: var(--accent); }

  .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    align-self: flex-end;
  }

  /* --- Quick Actions --- */
  .quick-actions {
    display: flex;
    gap: 6px;
    padding-top: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .quick-actions button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 16px;
    font-size: 12px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <h1>
    <span class="status-dot" id="statusDot"></span>
    CodePilot
    <span class="e2e-badge" id="e2eBadge">E2E</span>
  </h1>
  <span class="status-text" id="statusText">Disconnected</span>
</header>

<div class="connect-panel" id="connectPanel">
  <div class="connect-row">
    <select id="modeSelect" onchange="updateConnectionMode()">
      <option value="lan">LAN</option>
      <option value="relay">Relay</option>
    </select>
  </div>
  <div class="connect-row" data-mode-group="lan">
    <input type="text" id="hostInput" placeholder="Host IP" value="">
    <input type="number" id="portInput" placeholder="Port" value="19260" style="max-width: 80px;">
  </div>
  <div class="connect-row" data-mode-group="lan">
    <input type="text" id="tokenInput" placeholder="Paste token from terminal">
  </div>
  <div class="connect-row hidden" data-mode-group="relay">
    <input type="text" id="relayInput" placeholder="Relay URL (e.g. wss://relay.example.com)">
  </div>
  <div class="connect-row hidden" data-mode-group="relay">
    <input type="text" id="channelInput" placeholder="Relay channel">
  </div>
  <div class="connect-row">
    <input type="text" id="bridgePubkeyInput" placeholder="Bridge pubkey (optional for LAN, required for relay)">
  </div>
  <div class="connect-row">
    <input type="text" id="otpInput" placeholder="OTP (optional for LAN, required for relay)">
    <button id="connectBtn" onclick="connect()">Connect</button>
  </div>
</div>

<div class="events" id="events"></div>

<div class="input-area">
  <div class="input-row">
    <textarea id="cmdInput" rows="1" placeholder="Type a command..."
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendCommand()}"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendCommand()" id="sendBtn" disabled>&#x27A4;</button>
  </div>
  <div class="quick-actions">
    <button onclick="quickCmd('list all files')">List files</button>
    <button onclick="quickCmd('run tests')">Run tests</button>
    <button onclick="quickCmd('git status')">Git status</button>
    <button onclick="quickCmd('explain this project')">Explain</button>
  </div>
</div>

<script type="module" src="./test-client.js"></script>

</body>
</html>
